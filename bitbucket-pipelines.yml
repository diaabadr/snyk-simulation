image: mcr.microsoft.com/dotnet/sdk:9.0

pipelines:
  default:
    - step:
        name: Build
        caches:
          - dotnetcore
        script:
          - dotnet restore
          - dotnet build --no-restore

    - step:
        name: Snyk Code Scan (SAST)
        script:
          - pipe: snyk/snyk-scan:1.0.5
            variables:
              SNYK_TOKEN: $SNYK_TOKEN
              LANGUAGE: "nuget"
              COMMAND: "code test"
              SEVERITY_THRESHOLD: "high"
              DONT_BREAK_BUILD: "false"
              MONITOR: "false"

    - step:
        name: Snyk Open Source Scan (SCA)
        script:
          - pipe: snyk/snyk-scan:1.0.5
            variables:
              SNYK_TOKEN: $SNYK_TOKEN
              LANGUAGE: "nuget"
              SEVERITY_THRESHOLD: "high"
              DONT_BREAK_BUILD: "false"
              MONITOR: "true"
              TARGET_FILE: "TestingSnyk.csproj"
